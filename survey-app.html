// STORAGE — ответы отправляются на сервер (save.php)
// localStorage используется как фоллбэк при локальном тестировании
// ============================================================
const STORAGE_KEY = 'hse_survey_2026_responses';
const API_BASE = 'save.php'; // PHP-бэкенд лежит рядом с index.html

async function saveResponse(answers, otherTexts) {
  const payload = { answers, otherTexts: otherTexts || {} };
  try {
    const res = await fetch(API_BASE + '?action=response', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();
    console.log('Saved to server:', data.id);
    return data;
  } catch (e) {
    console.warn('Server unavailable, saving to localStorage:', e.message);
    const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    existing.push({
      id: Date.now() + '_' + Math.random().toString(36).slice(2,8),
      submittedAt: new Date().toISOString(),
      answers,
      otherTexts,
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
  }
}

async function saveContact(email) {
  try {
    const res = await fetch(API_BASE + '?action=contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!res.ok) throw new Error('Server error ' + res.status);
    return await res.json();
  } catch (e) {
    console.warn('Server unavailable, saving contact to localStorage:', e.message);
    const contacts = JSON.parse(localStorage.getItem('hse_survey_2026_contacts') || '[]');
    contacts.push({ email, submittedAt: new Date().toISOString() });
    localStorage.setItem('hse_survey_2026_contacts', JSON.stringify(contacts));
  }
}

// Admin: загрузка данных с сервера
const ADMIN_KEY = 'hse2026secret'; // совпадает с ключом в save.php

async function fetchResponses() {
  try {
    const res = await fetch(API_BASE + '?action=export&key=' + ADMIN_KEY);
    if (!res.ok) throw new Error('Server error');
    return await res.json();
  } catch (e) {
    console.warn('Fallback to localStorage');
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }
}

async function fetchContacts() {
  try {
    const res = await fetch(API_BASE + '?action=export_contacts&key=' + ADMIN_KEY);

    console.warn('Fallback to localStorage');
    return JSON.parse(localStorage.getItem('hse_survey_2026_contacts') || '[]');
  }
}

async function fetchStats() {

    if (!res.ok) throw new Error('Server error');
    return await res.json();
  } catch (e) {
    return null;
  }
}

function ProgressBar({current,total,sectionTitle}){
  const pct=Math.round(current/total*100);
  return(<div className="mb-6">
    <div className="flex justify-between items-center mb-1">
      <span className="text-sm text-gray-500">Вопрос {current} из {total}</span>
      <span className="text-sm font-medium text-indigo-600">{pct}%</span>
    </div>
    <div className="w-full bg-gray-200 rounded-full h-2">
      <div className="bg-indigo-500 h-2 rounded-full progress-bar" style={{width:`${pct}%`}}></div>
    </div>
    {sectionTitle&&<div className="mt-1 text-xs text-gray-400">{sectionTitle}</div>}
  </div>);
}

function SingleChoice({q,value,onChange,otherText,onOtherTextChange}){
  return(<div className="space-y-2">{q.options.map(opt=>(
    <div key={opt.value} className={`radio-option p-3 rounded-lg border cursor-pointer transition-all ${value===opt.value?'selected border-indigo-400 bg-indigo-50':'border-gray-200 hover:bg-gray-50'}`}
      onClick={()=>onChange(opt.value)}>
      <label className="flex items-center cursor-pointer">
        <input type="radio" checked={value===opt.value} onChange={()=>onChange(opt.value)} className="mr-3 text-indigo-600"/>
        <span className={`text-sm ${opt.value>=98?'text-gray-400 italic':''}`}>{opt.label}</span>
      </label>
      {q.hasOther===opt.value&&value===opt.value&&(
        <input type="text" placeholder="Укажите..." value={otherText||''} onChange={e=>onOtherTextChange(e.target.value)}
          className="mt-2 ml-7 w-full border border-gray-300 rounded px-3 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400"/>)}
    </div>))}</div>);
}

function MultipleChoice({q,value=[],onChange,otherText,onOtherTextChange}){
  const toggle=v=>{const excl=q.exclusive||[];if(excl.includes(v)){onChange([v])}else{let next=value.filter(x=>!excl.includes(x));next=next.includes(v)?next.filter(x=>x!==v):[...next,v];onChange(next)}};
  return(<div className="space-y-2">{q.options.map(opt=>(
    <div key={opt.value} className={`check-option p-3 rounded-lg border cursor-pointer transition-all ${value.includes(opt.value)?'selected border-indigo-400 bg-indigo-50':'border-gray-200 hover:bg-gray-50'}`}
      onClick={()=>toggle(opt.value)}>
      <label className="flex items-center cursor-pointer">
        <input type="checkbox" checked={value.includes(opt.value)} onChange={()=>toggle(opt.value)} className="mr-3 text-indigo-600 rounded"/>
        <span className={`text-sm ${opt.value>=98?'text-gray-400 italic':''}`}>{opt.label}</span>
      </label>
      {q.hasOther===opt.value&&value.includes(opt.value)&&(
        <input type="text" placeholder="Укажите..." value={otherText||''} onChange={e=>onOtherTextChange(e.target.value)}
          className="mt-2 ml-7 w-full border border-gray-300 rounded px-3 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400"/>)}
    </div>))}</div>);
}

function NumberInput({q,value,onChange}){
  return(<div className="flex items-center space-x-3">
    <input type="number" value={value==null?'':value} onChange={e=>{const v=e.target.value===''?null:Number(e.target.value);onChange(v)}}
      min={q.min} max={q.max} placeholder={q.placeholder||''}
      className="w-40 border border-gray-300 rounded-lg px-4 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
    {q.suffix&&<span className="text-gray-500">{q.suffix}</span>}
  </div>);
}

function NumberWithRefuse({q,value,onChange}){
  const isRef=typeof value==='object'&&value!==null&&value.refused;
  return(<div className="space-y-3">
    <div className="flex items-center space-x-3">
      <input type="number" value={isRef?'':(value==null?'':value)} disabled={isRef}
        onChange={e=>{const v=e.target.value===''?null:Number(e.target.value);onChange(v)}}
        min={q.min} max={q.max}
        className={`w-40 border border-gray-300 rounded-lg px-4 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 ${isRef?'bg-gray-100 opacity-50':''}`}/>
      {q.suffix&&<span className="text-gray-500">{q.suffix}</span>}
    </div>
    {q.refuseOptions&&<div className="space-y-1 mt-2">{q.refuseOptions.map(opt=>(
      <div key={opt.value} className={`p-2 rounded border cursor-pointer text-sm transition-all ${isRef&&value.code===opt.value?'border-indigo-400 bg-indigo-50':'border-gray-200 hover:bg-gray-50'}`}
        onClick={()=>onChange({refused:true,code:opt.value})}>
        <label className="flex items-center cursor-pointer">
          <input type="radio" checked={isRef&&value.code===opt.value} onChange={()=>onChange({refused:true,code:opt.value})} className="mr-2"/>
          <span className="text-gray-400 italic">{opt.label}</span>
        </label>
      </div>))}</div>}
  </div>);
}

function TextInput({q,value,onChange}){

    className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>;
  return<input type="text" value={value||''} onChange={e=>onChange(e.target.value)} placeholder="Введите ответ..."
    className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"/>;
}

  return(<div className="grid grid-cols-1 md:grid-cols-2 gap-4">{q.periods.map((period,pi)=>(

function PercentageDistribution({q,value={},onChange}){
  const isRef=value._refused;
  const vals=q.rows.map(r=>{const v=value[r.key];return(v==null||v==='')?0:Number(v)});
  const total=vals.reduce((s,v)=>s+v,0);const ok=total===q.totalCheck;
  return(<div className="space-y-3">
    {!isRef&&q.rows.map(r=>(
      <div key={r.key} className="flex items-center space-x-3">
        <span className="text-sm text-gray-600 w-2/3">{r.label}</span>
        <input type="number" value={value[r.key]==null?'':value[r.key]}
          onChange={e=>{const v=e.target.value===''?undefined:Number(e.target.value);onChange({...value,[r.key]:v,_refused:false})}}
          min={0} max={100} className="w-20 border border-gray-300 rounded px-2 py-1 text-center focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        <span className="text-gray-400 text-sm">%</span>
      </div>))}
    {!isRef&&<div className={`text-sm font-medium p-2 rounded ${ok?'bg-green-50 text-green-700':'bg-red-50 text-red-600'}`}>

      <button key={opt.value} className={`text-xs px-3 py-1 rounded border ${isRef&&value._refusedCode===opt.value?'border-indigo-400 bg-indigo-50 text-indigo-600':'border-gray-300 text-gray-400 hover:bg-gray-100'}`}
        onClick={()=>onChange({_refused:true,_refusedCode:opt.value})}>{opt.label}</button>))}</div>}
  </div>);
}

    {!isRef&&Array.from({length:q.count},(_,i)=>(
      <div key={i} className="flex items-center space-x-3">
        <span className="text-sm text-gray-500 w-6">{i+1}.</span>
        <input type="text" value={value[`item_${i}`]||''} onChange={e=>onChange({...value,[`item_${i}`]:e.target.value,_refused:false})}
          placeholder="Укажите позицию/специальность..."
          className="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      </div>))}
    {q.refuseOptions&&<div className="space-y-1 mt-2">{q.refuseOptions.map(opt=>(
      <div key={opt.value} className={`p-2 rounded border cursor-pointer text-sm ${isRef&&value._refusedCode===opt.value?'border-indigo-400 bg-indigo-50':'border-gray-200 hover:bg-gray-50'}`}
        onClick={()=>onChange({_refused:true,_refusedCode:opt.value})}>
        <label className="flex items-center cursor-pointer">
          <input type="radio" checked={isRef&&value._refusedCode===opt.value} onChange={()=>onChange({_refused:true,_refusedCode:opt.value})} className="mr-2"/>
          <span className="text-gray-400 italic">{opt.label}</span>
        </label>
      </div>))}</div>}
  </div>);
}

function QuestionRenderer({question:q,answers,setAnswer,otherTexts,setOtherText}){
  const val=answers[q.id],ot=otherTexts[q.id];
  const onChange=v=>setAnswer(q.id,v),onOt=t=>setOtherText(q.id,t);
  const map={
    single:()=><SingleChoice q={q} value={val} onChange={onChange} otherText={ot} onOtherTextChange={onOt}/>,
    single_with_text:()=><SingleChoice q={q} value={val} onChange={onChange} otherText={ot} onOtherTextChange={onOt}/>,
    multiple:()=><MultipleChoice q={q} value={val} onChange={onChange} otherText={ot} onOtherTextChange={onOt}/>,
    number:()=><NumberInput q={q} value={val} onChange={onChange}/>,
    number_with_refuse:()=><NumberWithRefuse q={q} value={val} onChange={onChange}/>,
    text:()=><TextInput q={q} value={val} onChange={onChange}/>,
    date:()=>null,
    dual_number:()=><DualNumber q={q} value={val} onChange={onChange}/>,
    dual_number_refuse:()=><DualNumberRefuse q={q} value={val} onChange={onChange}/>,
    matrix_single:()=><MatrixSingle q={q} value={val} onChange={onChange}/>,
    dual_period_single:()=><DualPeriodSingle q={q} value={val} onChange={onChange}/>,
    dual_period_multiple:()=><DualPeriodMultiple q={q} value={val} onChange={onChange}/>,
    percentage_distribution:()=><PercentageDistribution q={q} value={val} onChange={onChange}/>,
    dual_percentage_distribution:()=><DualPercentageDistribution q={q} value={val} onChange={onChange}/>,
    text_list:()=><TextList q={q} value={val} onChange={onChange}/>,
  };
  return(map[q.type]||(() =><div className="text-red-500">Unknown: {q.type}</div>))();
}

function AdminPanel(){
  const [responses,setResponses]=useState([]);
  const [contacts,setContacts]=useState([]);
  const [stats,setStats]=useState(null);
  const [loading,setLoading]=useState(true);

  const loadData=async()=>{
    setLoading(true);
    const [r,c,s]=await Promise.all([fetchResponses(),fetchContacts(),fetchStats()]);
    setResponses(r||[]);setContacts(c||[]);setStats(s);setLoading(false);
  };
  useEffect(()=>{loadData()},[]);

  const refresh=()=>loadData();
  const exportAll=()=>{
    const data=JSON.stringify(responses,null,2);
    const blob=new Blob(['\ufeff'+data],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`survey_export_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };
  const exportCsv=()=>{
    if(responses.length===0)return;
    const allKeys=new Set();responses.forEach(r=>Object.keys(r.answers).forEach(k=>allKeys.add(k)));
    const keys=Array.from(allKeys).sort();
    let csv='id;submittedAt;'+keys.join(';')+'\n';
    responses.forEach(r=>{
      const row=[r.id,r.submittedAt,...keys.map(k=>{const v=r.answers[k];return typeof v==='object'?JSON.stringify(v):String(v??'')})];
      csv+=row.map(c=>String(c).replace(/;/g,',')).join(';')+'\n';
    });
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`survey_export_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  return(
    <div className="min-h-screen p-6 max-w-6xl mx-auto">
      <div className="bg-white rounded-2xl shadow-lg p-6">
        <div className="flex justify-between items-center mb-6">
          <div>
            <h1 className="text-2xl font-bold text-gray-800">Панель администратора</h1>
            <p className="text-sm text-gray-500">Собрано ответов: <strong>{responses.length}</strong>{stats&&<span> (сервер: {stats.responses} ответов, {stats.contacts} контактов)</span>}</p>
          </div>
          <a href="#" className="text-sm text-indigo-600 hover:underline">&#8592; К анкете</a>
        </div>
        {loading&&<p className="text-center text-gray-400 py-4">Загрузка данных с сервера...</p>}
        <div className="flex gap-3 mb-6">
          <button onClick={refresh} className="px-4 py-2 bg-gray-100 rounded-lg text-sm hover:bg-gray-200">Обновить</button>
          <button onClick={exportAll} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">Экспорт JSON</button>
          <button onClick={exportCsv} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">Экспорт CSV</button>
        </div>
        {responses.length===0?<p className="text-gray-400 text-center py-12">Пока нет собранных ответов.</p>:
        <div className="overflow-x-auto">
          <table className="admin-table w-full"><thead><tr className="bg-gray-50">
            <th>#</th><th>Дата</th><th>Регион</th><th>Сотрудники</th><th>ОКВЭД</th><th>Детали</th>
          </tr></thead><tbody>{responses.map((r,i)=>(
            <tr key={r.id} className="hover:bg-gray-50">
              <td>{i+1}</td>
              <td>{new Date(r.submittedAt).toLocaleString('ru')}</td>
              <td>{r.answers.META_REGION||'—'}</td>
              <td>{r.answers.S03||'—'}</td>
              <td>{r.answers.S01||'—'}</td>
              <td><details><summary className="cursor-pointer text-indigo-600 text-xs">Показать</summary>
                <pre className="text-xs mt-1 p-2 bg-gray-50 rounded max-h-40 overflow-auto">{JSON.stringify(r.answers,null,1)}</pre>
              </details></td>
            </tr>))}</tbody></table>
        </div>}

        {contacts.length>0&&(
        <div className="mt-8 pt-6 border-t">
          <h3 className="text-lg font-semibold text-gray-700 mb-3">Контакты для получения результатов ({contacts.length})</h3>
          <div className="space-y-1">{contacts.map((c,i)=>(
            <div key={i} className="flex justify-between items-center p-2 bg-gray-50 rounded text-sm">
              <span>{c.email}</span>
              <span className="text-xs text-gray-400">{new Date(c.submittedAt).toLocaleString('ru')}</span>
            </div>))}
          </div>
        </div>)}
      </div>
    </div>);
}

  const [contactSent,setContactSent]=useState(false);
  const [sending,setSending]=useState(false);
  const sendContactHandler=async()=>{
    if(!contactEmail.trim()||sending)return;
    setSending(true);
    await saveContact(contactEmail.trim());
    setSending(false);
    setContactSent(true);
  };
  return(
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="max-w-xl bg-white rounded-2xl shadow-lg p-8 text-center">

        <h2 className="text-2xl font-bold text-green-700 mb-3">Спасибо за участие!</h2>
        <p className="text-gray-600 mb-6">Ваши ответы сохранены. Благодарим за участие в исследовании! Ваше мнение очень ценно для нас.</p>
        <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 text-left">
          <p className="text-sm text-gray-700 mb-3">Если вы хотите узнать результаты опроса, оставьте, пожалуйста, свои контактные данные. <span className="font-medium text-gray-800">Контактные данные не будут привязаны к заполненной анкете.</span></p>
          {!contactSent?(

              <button onClick={sendContactHandler} disabled={sending} className="px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition disabled:opacity-50">{sending?'Отправка...':'Отправить'}</button>
            </div>

            <div className="text-sm text-green-700 font-medium p-2 bg-green-50 rounded-lg">Спасибо! Мы свяжемся с вами, когда результаты будут готовы.</div>
          )}
        </div>
      </div>
    </div>);
}

              <li>&#8226; Опрос полностью <strong>анонимен</strong>. Мы не собираем персональные данные, позволяющие идентифицировать Вас или Ваше предприятие.</li>

function SurveyApp(){
  const [consented,setConsented]=useState(false);
  const [answers,setAnswers]=useState({});
  const [otherTexts,setOtherTexts]=useState({});
  const [currentIdx,setCurrentIdx]=useState(0);
  const [terminated,setTerminated]=useState(null);
  const [completed,setCompleted]=useState(false);
  const [validationErr,setValidationErr]=useState(null);
  const topRef=useRef(null);

  const visibleQuestions=useMemo(()=>QUESTIONS.filter(q=>!q.showIf||q.showIf(answers)),[answers]);
  const currentQ=visibleQuestions[currentIdx];
  const currentSection=currentQ?SURVEY_SECTIONS.find(s=>s.id===currentQ.section):null;

  const setAnswer=useCallback((id,val)=>{setAnswers(p=>({...p,[id]:val}));setValidationErr(null)},[]);
  const setOtherTextCb=useCallback((id,t)=>{setOtherTexts(p=>({...p,[id]:t}))},[]);
  const scrollTop=()=>{if(topRef.current)topRef.current.scrollIntoView({behavior:'smooth'})};

  const [submitting,setSubmitting]=useState(false);
  const goNext=async()=>{
    if(!currentQ||submitting)return;
    if(currentQ.terminateIf){
      const val=answers[currentQ.id];
      if(currentQ.terminateIf(val)){setTerminated(currentQ.terminateMsg||'Интервью завершено.');return}
    }
    if(currentQ.validate){const err=currentQ.validate(answers[currentQ.id],answers);if(err){setValidationErr(err);return}}
    if(currentIdx<visibleQuestions.length-1){setCurrentIdx(currentIdx+1);setValidationErr(null);scrollTop()}
    else{
      setSubmitting(true);
      const finalAnswers={...answers,_autoDate:new Date().toISOString(),_format:'online'};
      await saveResponse(finalAnswers,otherTexts);
      setSubmitting(false);
      setCompleted(true);
    }
  };
  const goPrev=()=>{if(currentIdx>0){setCurrentIdx(currentIdx-1);setValidationErr(null);scrollTop()}};
  const restart=()=>{setAnswers({});setOtherTexts({});setCurrentIdx(0);setTerminated(null);setCompleted(false);setValidationErr(null);setConsented(false)};

  if(!consented)return<ConsentScreen onAccept={()=>setConsented(true)}/>;

  if(terminated)return(
    <div className="terminate-screen max-w-xl mx-auto mt-20 p-8 rounded-2xl border border-red-200 text-center">
      <div className="text-5xl mb-4">&#9888;&#65039;</div>
      <h2 className="text-xl font-bold text-red-700 mb-3">Опрос завершён</h2>
      <p className="text-gray-600 mb-6">{terminated}</p>
      <button onClick={restart} className="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Начать заново</button>
    </div>);

  if(completed)return(<CompletionScreen/>);

  if(!currentQ)return null;

  return(
    <div className="min-h-screen pb-20">
      <div className="bg-white shadow-sm border-b sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-lg font-bold text-gray-800">Исследование промышленных предприятий</h1>
              <p className="text-xs text-gray-400">НИУ ВШЭ — ИАПР, 2026</p>
            </div>
            {currentSection&&<span className="inline-block text-xs text-white px-3 py-1 rounded-full section-badge">{currentSection.title}</span>}
          </div>
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-4 pt-6" ref={topRef}>
        <ProgressBar current={currentIdx+1} total={visibleQuestions.length} sectionTitle={currentSection?.title}/>

        <div className="bg-white rounded-2xl shadow-lg p-6 md:p-8 fade-in">
          <div className="mb-1 text-xs text-indigo-400 font-medium">{currentQ.id}</div>
          <h2 className="text-lg font-semibold text-gray-800 mb-2 leading-snug">{currentQ.text}</h2>
          {currentQ.hint&&<p className="text-sm text-gray-400 mb-4 italic">{currentQ.hint}</p>}
          <div className="mt-4">
            <QuestionRenderer question={currentQ} answers={answers} setAnswer={setAnswer} otherTexts={otherTexts} setOtherText={setOtherTextCb}/>
          </div>
          {validationErr&&<div className="mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">{validationErr}</div>}

          <div className="flex justify-between items-center mt-8 pt-4 border-t">
            <button onClick={goPrev} disabled={currentIdx===0}
              className={`px-5 py-2 rounded-lg text-sm font-medium transition ${currentIdx===0?'text-gray-300 cursor-not-allowed':'text-gray-600 hover:bg-gray-100 border border-gray-200'}`}>
              &#8592; Назад</button>
            <button onClick={goNext} disabled={submitting}
              className="px-6 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm disabled:opacity-50">
              {submitting?'Сохранение...':(currentIdx===visibleQuestions.length-1?'Завершить':'Далее')} {!submitting&&'\u2192'}</button>
          </div>
        </div>

        <div className="mt-6 flex flex-wrap gap-1 justify-center">
          {SURVEY_SECTIONS.map(s=>{
            const sQs=visibleQuestions.filter(q=>q.section===s.id);if(!sQs.length)return null;
            const fi=visibleQuestions.indexOf(sQs[0]),li=visibleQuestions.indexOf(sQs[sQs.length-1]);
            const active=currentIdx>=fi&&currentIdx<=li,done=currentIdx>li;
            return(<button key={s.id} onClick={()=>{if(fi<=currentIdx){setCurrentIdx(fi);scrollTop()}}}
              className={`text-xs px-2 py-1 rounded-full border transition ${active?'bg-indigo-100 border-indigo-300 text-indigo-700 font-medium':done?'bg-green-50 border-green-200 text-green-600':'bg-gray-50 border-gray-200 text-gray-400'}`}
              title={s.title}>{s.id==='meta'?'Мета':s.id==='screener'?'S':s.id}</button>);
          })}
        </div>
      </div>
    </div>);
}

// ============================================================
// ROUTER: #admin shows admin panel, otherwise shows survey
// ============================================================
function App(){
  const [page,setPage]=useState(window.location.hash);
  useEffect(()=>{const h=()=>setPage(window.location.hash);window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h)},[]);
  if(page==='#admin')return<AdminPanel/>;
  return<SurveyApp/>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
