<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Администрирование — Исследование ИАПР НИУ ВШЭ 2026</title>
<style>
  :root{
    --hse-blue:#102E4A;
    --hse-red:#C8102E;
    --bg:#f5f7fb;
    --ink:#0F1A2B;
    --border:#e5e7eb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  a{color:var(--hse-blue)}
  .container{max-width:1100px;margin:0 auto;padding:24px 20px}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px;box-shadow:0 1px 2px rgba(15,26,43,.04)}
  h1{font-size:22px;margin:0 0 4px;color:var(--hse-blue)}
  h2{font-size:16px;margin:24px 0 10px;color:var(--hse-blue)}
  .muted{color:#6b7280;font-size:13px}
  .login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:420px}
  label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#374151}
  input[type=password],input[type=text]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit}
  input[type=password]:focus,input[type=text]:focus{outline:none;border-color:var(--hse-blue);box-shadow:0 0 0 3px rgba(16,46,74,.1)}
  .btn{display:inline-block;padding:10px 18px;border-radius:6px;font-size:14px;font-weight:500;border:1px solid transparent;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn-primary{background:var(--hse-blue);color:#fff}
  .btn-primary:hover{background:#0b2238}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .btn-ghost{background:#fff;color:#374151;border-color:var(--border)}
  .btn-ghost:hover{background:#f9fafb}
  .btn-danger{background:#fff;color:var(--hse-red);border-color:#f3cfd3}
  .btn-danger:hover{background:#fff5f5}
  .error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:8px 12px;border-radius:6px;font-size:13px;margin-top:12px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:20px;flex-wrap:wrap}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:14px}
  .stat-num{font-size:24px;font-weight:600;color:var(--hse-blue)}
  .stat-label{font-size:12px;color:#6b7280;margin-top:2px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
  th{background:#f9fafb;font-weight:600;color:#374151;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  tr:hover td{background:#f9fafb}
  details summary{cursor:pointer;color:var(--hse-blue);font-size:12px}
  pre{background:#f3f4f6;padding:8px;border-radius:4px;font-size:11px;max-height:200px;overflow:auto;margin:6px 0 0}
  .tab-nav{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .tab{padding:8px 14px;cursor:pointer;border:none;background:none;font-size:14px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;font-family:inherit}
  .tab.active{color:var(--hse-blue);border-bottom-color:var(--hse-blue)}
  .empty{text-align:center;color:#9ca3af;padding:40px 20px}
  .loading{text-align:center;color:#6b7280;padding:24px}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen" class="login-wrap">
  <div class="card login-card">
    <h1>Администрирование</h1>
    <p class="muted" style="margin:0 0 18px">Исследование промышленных предприятий — НИУ ВШЭ 2026</p>
    <form id="login-form" autocomplete="off">
      <label for="admin-key">Ключ администратора</label>
      <input type="password" id="admin-key" autocomplete="off" required/>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:center">
        <button type="submit" class="btn btn-primary" id="login-btn">Войти</button>
        <a href="/" class="btn btn-ghost">На главную</a>
      </div>
      <div id="login-error" class="error" style="display:none"></div>
      <p class="muted" style="margin:16px 0 0;font-size:12px">Ключ хранится в пределах текущей вкладки и удаляется при выходе.</p>
    </form>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="dashboard" class="container" style="display:none">
  <div class="card">
    <div class="header">
      <div>
        <h1>Панель администратора</h1>
        <p class="muted" id="sub-stats">Загрузка…</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" id="refresh-btn">Обновить</button>
        <button class="btn btn-danger" id="logout-btn">Выйти</button>
      </div>
    </div>

    <div class="stats" id="stats-grid"></div>

    <div class="toolbar">
      <button class="btn btn-primary" id="export-json-btn">Скачать ответы (JSON)</button>
      <button class="btn btn-primary" id="export-csv-btn">Скачать ответы (CSV)</button>
      <button class="btn btn-ghost" id="export-contacts-btn">Скачать контакты (JSON)</button>
    </div>

    <div class="tab-nav">
      <button class="tab active" data-tab="responses">Ответы (<span id="resp-count">0</span>)</button>
      <button class="tab" data-tab="contacts">Контакты (<span id="cont-count">0</span>)</button>
    </div>

    <div id="tab-responses">
      <div id="responses-content" class="loading">Загрузка…</div>
    </div>
    <div id="tab-contacts" style="display:none">
      <div id="contacts-content" class="loading">Загрузка…</div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  var API = '/save.php';
  var SESSION_KEY = 'hse_admin_key';

  var loginScreen = document.getElementById('login-screen');
  var dashboard   = document.getElementById('dashboard');
  var loginForm   = document.getElementById('login-form');
  var keyInput    = document.getElementById('admin-key');
  var loginBtn    = document.getElementById('login-btn');
  var loginError  = document.getElementById('login-error');

  var state = { responses: [], contacts: [], stats: null };

  function getKey(){ return sessionStorage.getItem(SESSION_KEY) || ''; }
  function setKey(k){ sessionStorage.setItem(SESSION_KEY, k); }
  function clearKey(){ sessionStorage.removeItem(SESSION_KEY); }

  function showError(msg){
    loginError.textContent = msg;
    loginError.style.display = 'block';
  }
  function hideError(){ loginError.style.display = 'none'; }

  async function login(key){
    var res = await fetch(API + '?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: key })
    });
    if (res.status === 403) throw new Error('Неверный ключ');
    if (!res.ok) throw new Error('Сервер недоступен (' + res.status + ')');
    return res.json();
  }

  async function apiGet(action){
    var res = await fetch(API + '?action=' + action, {
      headers: { 'X-Admin-Key': getKey() }
    });
    if (res.status === 403) {
      clearKey();
      showLogin();
      showError('Сессия истекла. Войдите заново.');
      throw new Error('403');
    }
    if (!res.ok) throw new Error('Ошибка загрузки: ' + res.status);
    return res.json();
  }

  function showLogin(){
    dashboard.style.display = 'none';
    loginScreen.style.display = 'flex';
    keyInput.value = '';
    setTimeout(function(){ keyInput.focus(); }, 50);
  }
  function showDashboard(){
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    hideError();
    loadAll();
  }

  loginForm.addEventListener('submit', async function(e){
    e.preventDefault();
    hideError();
    var key = keyInput.value.trim();
    if (!key) return;
    loginBtn.disabled = true;
    loginBtn.textContent = 'Проверка…';
    try {
      await login(key);
      setKey(key);
      showDashboard();
    } catch (err) {
      showError(err.message || 'Не удалось войти');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Войти';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function(){
    clearKey();
    showLogin();
  });

  document.getElementById('refresh-btn').addEventListener('click', loadAll);

  async function loadAll(){
    document.getElementById('responses-content').innerHTML = '<div class="loading">Загрузка…</div>';
    document.getElementById('contacts-content').innerHTML = '<div class="loading">Загрузка…</div>';
    try {
      var results = await Promise.all([
        apiGet('export'),
        apiGet('export_contacts'),
        apiGet('stats')
      ]);
      state.responses = results[0] || [];
      state.contacts  = results[1] || [];
      state.stats     = results[2] || null;
      renderStats();
      renderResponses();
      renderContacts();
    } catch (e) {
      console.error(e);
    }
  }

  function renderStats(){
    var s = state.stats || { responses: state.responses.length, contacts: state.contacts.length };
    document.getElementById('stats-grid').innerHTML =
      '<div class="stat"><div class="stat-num">' + (s.responses || 0) + '</div><div class="stat-label">ответов получено</div></div>' +
      '<div class="stat"><div class="stat-num">' + (s.contacts || 0) + '</div><div class="stat-label">контактов оставлено</div></div>' +
      '<div class="stat"><div class="stat-num">' + state.responses.length + '</div><div class="stat-label">загружено в таблицу</div></div>';
    document.getElementById('sub-stats').textContent =
      'Ответов: ' + (s.responses || 0) + ' · контактов: ' + (s.contacts || 0);
    document.getElementById('resp-count').textContent = state.responses.length;
    document.getElementById('cont-count').textContent = state.contacts.length;
  }

  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function renderResponses(){
    var host = document.getElementById('responses-content');
    if (!state.responses.length) {
      host.innerHTML = '<div class="empty">Пока нет собранных ответов.</div>';
      return;
    }
    var rows = state.responses.map(function(r, i){
      var a = r.answers || {};
      return '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td>' + escapeHtml(new Date(r.submittedAt).toLocaleString('ru')) + '</td>' +
        '<td>' + escapeHtml(a.META_REGION || '—') + '</td>' +
        '<td>' + escapeHtml(a.S03 || '—') + '</td>' +
        '<td>' + escapeHtml(a.S01 || '—') + '</td>' +
        '<td>' + Math.round((r.totalTimeMs || 0) / 1000) + ' с</td>' +
        '<td><details><summary>Показать</summary><pre>' + escapeHtml(JSON.stringify(a, null, 2)) + '</pre></details></td>' +
      '</tr>';
    }).join('');
    host.innerHTML = '<div style="overflow-x:auto"><table>' +
      '<thead><tr><th>#</th><th>Дата</th><th>Регион</th><th>Сотрудники</th><th>ОКВЭД</th><th>Время</th><th>Ответы</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
  }

  function renderContacts(){
    var host = document.getElementById('contacts-content');
    if (!state.contacts.length) {
      host.innerHTML = '<div class="empty">Пока нет контактов.</div>';
      return;
    }
    var rows = state.contacts.map(function(c, i){
      return '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td>' + escapeHtml(c.email || '') + '</td>' +
        '<td>' + escapeHtml(new Date(c.submittedAt).toLocaleString('ru')) + '</td>' +
      '</tr>';
    }).join('');
    host.innerHTML = '<div style="overflow-x:auto"><table>' +
      '<thead><tr><th>#</th><th>Email</th><th>Дата</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div>';
  }

  Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(tab){
    tab.addEventListener('click', function(){
      Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      var name = tab.getAttribute('data-tab');
      document.getElementById('tab-responses').style.display = name === 'responses' ? 'block' : 'none';
      document.getElementById('tab-contacts').style.display  = name === 'contacts'  ? 'block' : 'none';
    });
  });

  function downloadBlob(filename, blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  document.getElementById('export-json-btn').addEventListener('click', function(){
    var data = JSON.stringify(state.responses, null, 2);
    downloadBlob('responses_' + new Date().toISOString().slice(0,10) + '.json',
      new Blob(['\ufeff' + data], { type: 'application/json;charset=utf-8' }));
  });

  document.getElementById('export-contacts-btn').addEventListener('click', function(){
    var data = JSON.stringify(state.contacts, null, 2);
    downloadBlob('contacts_' + new Date().toISOString().slice(0,10) + '.json',
      new Blob(['\ufeff' + data], { type: 'application/json;charset=utf-8' }));
  });

  document.getElementById('export-csv-btn').addEventListener('click', function(){
    if (!state.responses.length) return;
    var allKeys = {};
    state.responses.forEach(function(r){
      Object.keys(r.answers || {}).forEach(function(k){ allKeys[k] = 1; });
    });
    var keys = Object.keys(allKeys).sort();
    var header = ['id','submittedAt','totalTimeMs'].concat(keys);
    var csvRows = [header.join(';')];
    state.responses.forEach(function(r){
      var a = r.answers || {};
      var row = [r.id, r.submittedAt, r.totalTimeMs || 0].concat(keys.map(function(k){
        var v = a[k];
        if (v == null) return '';
        if (typeof v === 'object') v = JSON.stringify(v);
        return String(v).replace(/;/g, ',').replace(/\r?\n/g, ' ');
      }));
      csvRows.push(row.join(';'));
    });
    downloadBlob('responses_' + new Date().toISOString().slice(0,10) + '.csv',
      new Blob(['\ufeff' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8' }));
  });

  if (getKey()) {
    showDashboard();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
